kind = "web"
previewPath = "/"
title = "Splitwise Clone"
version = "1.0.0"
id = "artifacts/splitwise-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18238

[services.development]
run = "pnpm --filter @workspace/splitwise-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/splitwise-web", "run", "build" ]
publicDir = "artifacts/splitwise-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18238"
BASE_PATH = "/"
