openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Splitix API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profile operations
  - name: groups
    description: Group operations
  - name: expenses
    description: Expense operations
  - name: payments
    description: Payment / settle up operations
  - name: dashboard
    description: Dashboard summary operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Users ────────────────────────────────────────────────────────────────
  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Groups ───────────────────────────────────────────────────────────────
  /groups:
    get:
      operationId: listGroups
      tags: [groups]
      summary: List groups the current user belongs to
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GroupWithBalance"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createGroup
      tags: [groups]
      summary: Create a new group
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupBody"
      responses:
        "201":
          description: Created group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /groups/{groupId}:
    get:
      operationId: getGroup
      tags: [groups]
      summary: Get group detail
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: Group detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateGroup
      tags: [groups]
      summary: Update group
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGroupBody"
      responses:
        "200":
          description: Updated group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteGroup
      tags: [groups]
      summary: Delete group
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /groups/{groupId}/members:
    post:
      operationId: addGroupMember
      tags: [groups]
      summary: Add a member to the group by email
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemberBody"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupMember"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /groups/{groupId}/members/{memberId}:
    delete:
      operationId: removeGroupMember
      tags: [groups]
      summary: Remove a member from the group
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - name: memberId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Member removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /groups/{groupId}/balances:
    get:
      operationId: getGroupBalances
      tags: [groups]
      summary: Get simplified debt balances for the group
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: Simplified balances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Balance"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Expenses ─────────────────────────────────────────────────────────────
  /groups/{groupId}/expenses:
    get:
      operationId: listExpenses
      tags: [expenses]
      summary: List expenses in a group
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExpenseWithSplits"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createExpense
      tags: [expenses]
      summary: Add an expense to the group
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExpenseBody"
      responses:
        "201":
          description: Created expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseWithSplits"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /expenses/{expenseId}:
    get:
      operationId: getExpense
      tags: [expenses]
      summary: Get expense detail
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/ExpenseId"
      responses:
        "200":
          description: Expense with splits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseWithSplits"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateExpense
      tags: [expenses]
      summary: Update an expense
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/ExpenseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExpenseBody"
      responses:
        "200":
          description: Updated expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseWithSplits"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteExpense
      tags: [expenses]
      summary: Delete an expense
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/ExpenseId"
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Payments ─────────────────────────────────────────────────────────────
  /groups/{groupId}/payments:
    get:
      operationId: listPayments
      tags: [payments]
      summary: List settle-up payments in a group
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createPayment
      tags: [payments]
      summary: Record a settle-up payment
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentBody"
      responses:
        "201":
          description: Created payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /payments/{paymentId}:
    delete:
      operationId: deletePayment
      tags: [payments]
      summary: Delete a payment record
      security: [{ bearerAuth: [] }]
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Dashboard / wow endpoints ────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get overall balance summary for the current user
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /dashboard/activity:
    get:
      operationId: getActivity
      tags: [dashboard]
      summary: Get recent activity feed (expenses + payments) across all groups
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  parameters:
    GroupId:
      name: groupId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ExpenseId:
      name: expenseId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    # ─── User ─────────────────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
        avatarUrl:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, name, email, createdAt]

    UpdateUserBody:
      type: object
      properties:
        name:
          type: string
        avatarUrl:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        location:
          type: string
          nullable: true

    # ─── Group ────────────────────────────────────────────────────────────
    Group:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        createdByUserId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
      required: [id, name, createdByUserId, createdAt]

    GroupWithBalance:
      allOf:
        - $ref: "#/components/schemas/Group"
        - type: object
          properties:
            memberCount:
              type: integer
            myNetBalance:
              type: number
              description: Positive means others owe me, negative means I owe others
          required: [memberCount, myNetBalance]

    GroupDetail:
      allOf:
        - $ref: "#/components/schemas/Group"
        - type: object
          properties:
            members:
              type: array
              items:
                $ref: "#/components/schemas/GroupMember"
          required: [members]

    CreateGroupBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
      required: [name]

    UpdateGroupBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true

    GroupMember:
      type: object
      properties:
        id:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        user:
          $ref: "#/components/schemas/User"
        joinedAt:
          type: string
          format: date-time
      required: [id, groupId, userId, user, joinedAt]

    AddMemberBody:
      oneOf:
        - type: object
          title: AddMemberByEmail
          properties:
            email:
              type: string
              format: email
          required: [email]
          additionalProperties: false
        - type: object
          title: AddMemberByUserId
          properties:
            userId:
              type: string
              format: uuid
          required: [userId]
          additionalProperties: false

    # ─── Balance ──────────────────────────────────────────────────────────
    Balance:
      type: object
      description: "fromUser owes toUser the given amount"
      properties:
        fromUserId:
          type: string
          format: uuid
        fromUser:
          $ref: "#/components/schemas/User"
        toUserId:
          type: string
          format: uuid
        toUser:
          $ref: "#/components/schemas/User"
        amount:
          type: number
      required: [fromUserId, fromUser, toUserId, toUser, amount]

    # ─── Expense ──────────────────────────────────────────────────────────
    SplitType:
      type: string
      enum: [equal, exact, percentage]

    ExpenseSplit:
      type: object
      properties:
        id:
          type: string
          format: uuid
        expenseId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        user:
          $ref: "#/components/schemas/User"
        amount:
          type: number
          description: Amount this user owes
        percentage:
          type: number
          nullable: true
      required: [id, expenseId, userId, user, amount]

    Expense:
      type: object
      properties:
        id:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        description:
          type: string
        totalAmount:
          type: number
        currency:
          type: string
          default: USD
        splitType:
          $ref: "#/components/schemas/SplitType"
        paidByUserId:
          type: string
          format: uuid
        paidByUser:
          $ref: "#/components/schemas/User"
        date:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time
      required: [id, groupId, description, totalAmount, currency, splitType, paidByUserId, paidByUser, date, createdAt]

    ExpenseWithSplits:
      allOf:
        - $ref: "#/components/schemas/Expense"
        - type: object
          properties:
            splits:
              type: array
              items:
                $ref: "#/components/schemas/ExpenseSplit"
          required: [splits]

    ExpenseSplitInput:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        amount:
          type: number
          nullable: true
        percentage:
          type: number
          nullable: true
      required: [userId]

    CreateExpenseBody:
      type: object
      properties:
        description:
          type: string
        totalAmount:
          type: number
        currency:
          type: string
          default: USD
        splitType:
          $ref: "#/components/schemas/SplitType"
        paidByUserId:
          type: string
          format: uuid
        date:
          type: string
          format: date
        splits:
          type: array
          items:
            $ref: "#/components/schemas/ExpenseSplitInput"
      required: [description, totalAmount, splitType, paidByUserId, date, splits]

    UpdateExpenseBody:
      type: object
      properties:
        description:
          type: string
        totalAmount:
          type: number
        currency:
          type: string
        splitType:
          $ref: "#/components/schemas/SplitType"
        paidByUserId:
          type: string
          format: uuid
        date:
          type: string
          format: date
        splits:
          type: array
          items:
            $ref: "#/components/schemas/ExpenseSplitInput"

    # ─── Payment ──────────────────────────────────────────────────────────
    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        fromUserId:
          type: string
          format: uuid
        fromUser:
          $ref: "#/components/schemas/User"
        toUserId:
          type: string
          format: uuid
        toUser:
          $ref: "#/components/schemas/User"
        amount:
          type: number
        note:
          type: string
          nullable: true
        date:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time
      required: [id, groupId, fromUserId, fromUser, toUserId, toUser, amount, date, createdAt]

    CreatePaymentBody:
      type: object
      properties:
        fromUserId:
          type: string
          format: uuid
        toUserId:
          type: string
          format: uuid
        amount:
          type: number
        note:
          type: string
          nullable: true
        date:
          type: string
          format: date
      required: [fromUserId, toUserId, amount, date]

    # ─── Dashboard ────────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      properties:
        totalOwed:
          type: number
          description: Total amount others owe me across all groups
        totalIOwe:
          type: number
          description: Total amount I owe others across all groups
        netBalance:
          type: number
          description: totalOwed - totalIOwe
        groupCount:
          type: integer
        groupSummaries:
          type: array
          items:
            $ref: "#/components/schemas/GroupBalanceSummary"
      required: [totalOwed, totalIOwe, netBalance, groupCount, groupSummaries]

    GroupBalanceSummary:
      type: object
      properties:
        groupId:
          type: string
          format: uuid
        groupName:
          type: string
        myNetBalance:
          type: number
      required: [groupId, groupName, myNetBalance]

    ActivityItem:
      type: object
      properties:
        id:
          type: string
          description: Unique ID like "expense-42" or "payment-12"
        type:
          type: string
          enum: [expense, payment]
        groupId:
          type: string
          format: uuid
        groupName:
          type: string
        description:
          type: string
        amount:
          type: number
        involvedUserId:
          type: string
          format: uuid
          description: The paidBy user (expense) or fromUser (payment)
        involvedUser:
          $ref: "#/components/schemas/User"
        date:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time
      required: [id, type, groupId, groupName, description, amount, involvedUserId, involvedUser, date, createdAt]
