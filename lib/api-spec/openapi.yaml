openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Splitix API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profile operations
  - name: groups
    description: Group operations
  - name: expenses
    description: Expense operations
  - name: payments
    description: Payment / settle up operations
  - name: dashboard
    description: Dashboard summary operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Users ────────────────────────────────────────────────────────────────
  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Groups ───────────────────────────────────────────────────────────────
  /groups:
    get:
      operationId: listGroups
      tags: [groups]
      summary: List groups the current user belongs to
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GroupWithBalance"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createGroup
      tags: [groups]
      summary: Create a new group
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupBody"
      responses:
        "201":
          description: Created group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /groups/{groupId}:
    get:
      operationId: getGroup
      tags: [groups]
      summary: Get group detail
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: Group detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateGroup
      tags: [groups]
      summary: Update group
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGroupBody"
      responses:
        "200":
          description: Updated group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteGroup
      tags: [groups]
      summary: Delete group
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /groups/{groupId}/members:
    post:
      operationId: addGroupMember
      tags: [groups]
      summary: Add a member to the group by email
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemberBody"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupMember"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /groups/{groupId}/members/{memberId}:
    delete:
      operationId: removeGroupMember
      tags: [groups]
      summary: Remove a member from the group
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - name: memberId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Member removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /groups/{groupId}/expenses/include-member:
    post:
      operationId: includeMemberInPastExpenses
      tags: [groups]
      summary: Re-split existing equal-split expenses to include a member
      description: |
        After adding a new member to a group, optionally re-split all existing
        equal-split expenses to include that member. Exact and percentage splits
        are skipped because they have user-entered amounts that should not be
        silently changed.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IncludeMemberInPastExpensesBody"
      responses:
        "200":
          description: Result summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncludeMemberInPastExpensesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /groups/{groupId}/balances:
    get:
      operationId: getGroupBalances
      tags: [groups]
      summary: Get simplified debt balances for the group
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: Simplified balances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Balance"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Expenses ─────────────────────────────────────────────────────────────
  /friends/{friendId}/activity:
    get:
      operationId: getFriendActivity
      tags: [friends]
      summary: Get all expenses and payments between current user and a specific friend
      security: [{ bearerAuth: [] }]
      parameters:
        - name: friendId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Friend activity
          content:
            application/json:
              schema:
                type: object
                properties:
                  friend:
                    $ref: "#/components/schemas/User"
                  netBalance:
                    type: number
                    description: Positive = friend owes you, negative = you owe friend.
                  expenses:
                    type: array
                    items:
                      $ref: "#/components/schemas/ExpenseWithSplits"
                  payments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Payment"
                required: [friend, netBalance, expenses, payments]
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden — user is not your friend
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /expenses/non-group:
    get:
      operationId: listNonGroupExpenses
      tags: [expenses]
      summary: List all non-group (friend-only) expenses for the current user
      description: |
        Returns every non-group expense (`groupId` is null) where the current user
        is either the payer or appears in the splits, plus a summary balance.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Non-group expense history
          content:
            application/json:
              schema:
                type: object
                properties:
                  myNetBalance:
                    type: number
                    description: Positive = others owe you, negative = you owe.
                  count:
                    type: integer
                  expenses:
                    type: array
                    items:
                      $ref: "#/components/schemas/ExpenseWithSplits"
                required: [myNetBalance, count, expenses]
        "401":
          $ref: "#/components/responses/Unauthorized"

  /expenses:
    post:
      operationId: createFriendExpense
      tags: [expenses]
      summary: Create a non-group expense with a friend
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFriendExpenseBody"
      responses:
        "201":
          description: Created expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseWithSplits"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden — the target user is not your friend
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /groups/{groupId}/expenses:
    get:
      operationId: listExpenses
      tags: [expenses]
      summary: List expenses in a group
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExpenseWithSplits"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createExpense
      tags: [expenses]
      summary: Add an expense to the group
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExpenseBody"
      responses:
        "201":
          description: Created expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseWithSplits"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /expenses/{expenseId}:
    get:
      operationId: getExpense
      tags: [expenses]
      summary: Get expense detail
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/ExpenseId"
      responses:
        "200":
          description: Expense with splits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseWithSplits"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateExpense
      tags: [expenses]
      summary: Update an expense
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/ExpenseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExpenseBody"
      responses:
        "200":
          description: Updated expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseWithSplits"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteExpense
      tags: [expenses]
      summary: Delete an expense
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/ExpenseId"
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /expenses/{expenseId}/comments:
    get:
      operationId: listExpenseComments
      tags: [expenses]
      summary: List comments on an expense
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/ExpenseId"
      responses:
        "200":
          description: Comments ordered by createdAt asc
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExpenseComment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createExpenseComment
      tags: [expenses]
      summary: Add a comment to an expense
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/ExpenseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExpenseCommentBody"
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseComment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /expenses/{expenseId}/comments/{commentId}:
    delete:
      operationId: deleteExpenseComment
      tags: [expenses]
      summary: Delete one of your own comments
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/ExpenseId"
        - $ref: "#/components/parameters/CommentId"
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Payments ─────────────────────────────────────────────────────────────
  /groups/{groupId}/payments:
    get:
      operationId: listPayments
      tags: [payments]
      summary: List settle-up payments in a group
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createPayment
      tags: [payments]
      summary: Record a settle-up payment
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentBody"
      responses:
        "201":
          description: Created payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /payments:
    post:
      operationId: createNonGroupPayment
      tags: [payments]
      summary: Record a settle-up payment between two friends (no group)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNonGroupPaymentBody"
      responses:
        "201":
          description: Created payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Not friends with the recipient

  /payments/{paymentId}:
    delete:
      operationId: deletePayment
      tags: [payments]
      summary: Delete a payment record
      security: [{ bearerAuth: [] }]
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Dashboard / wow endpoints ────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get overall balance summary for the current user
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /dashboard/activity:
    get:
      operationId: getActivity
      tags: [dashboard]
      summary: Get recent activity feed (expenses + payments) across all groups
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  parameters:
    GroupId:
      name: groupId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ExpenseId:
      name: expenseId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CommentId:
      name: commentId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    # ─── User ─────────────────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
        avatarUrl:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, name, email, createdAt]

    UpdateUserBody:
      type: object
      properties:
        name:
          type: string
        avatarUrl:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        location:
          type: string
          nullable: true

    # ─── Group ────────────────────────────────────────────────────────────
    Group:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        createdByUserId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
      required: [id, name, createdByUserId, createdAt]

    GroupWithBalance:
      allOf:
        - $ref: "#/components/schemas/Group"
        - type: object
          properties:
            memberCount:
              type: integer
            myNetBalance:
              type: number
              description: Positive means others owe me, negative means I owe others
          required: [memberCount, myNetBalance]

    GroupDetail:
      allOf:
        - $ref: "#/components/schemas/Group"
        - type: object
          properties:
            members:
              type: array
              items:
                $ref: "#/components/schemas/GroupMember"
          required: [members]

    CreateGroupBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
      required: [name]

    UpdateGroupBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true

    GroupMember:
      type: object
      properties:
        id:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        user:
          $ref: "#/components/schemas/User"
        joinedAt:
          type: string
          format: date-time
      required: [id, groupId, userId, user, joinedAt]

    IncludeMemberInPastExpensesBody:
      type: object
      properties:
        userId:
          type: string
          format: uuid
      required: [userId]
      additionalProperties: false

    IncludeMemberInPastExpensesResponse:
      type: object
      properties:
        updatedCount:
          type: integer
          description: Number of expenses re-split to include the member
        skippedNonEqualCount:
          type: integer
          description: Number of expenses skipped because they use exact or percentage splits
        totalCount:
          type: integer
          description: Total number of expenses considered
      required: [updatedCount, skippedNonEqualCount, totalCount]
      additionalProperties: false

    AddMemberBody:
      oneOf:
        - type: object
          title: AddMemberByEmail
          properties:
            email:
              type: string
              format: email
          required: [email]
          additionalProperties: false
        - type: object
          title: AddMemberByUserId
          properties:
            userId:
              type: string
              format: uuid
          required: [userId]
          additionalProperties: false

    # ─── Balance ──────────────────────────────────────────────────────────
    Balance:
      type: object
      description: "fromUser owes toUser the given amount"
      properties:
        fromUserId:
          type: string
          format: uuid
        fromUser:
          $ref: "#/components/schemas/User"
        toUserId:
          type: string
          format: uuid
        toUser:
          $ref: "#/components/schemas/User"
        amount:
          type: number
      required: [fromUserId, fromUser, toUserId, toUser, amount]

    # ─── Expense ──────────────────────────────────────────────────────────
    SplitType:
      type: string
      enum: [equal, exact, percentage]

    ExpenseSplit:
      type: object
      properties:
        id:
          type: string
          format: uuid
        expenseId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        user:
          $ref: "#/components/schemas/User"
        amount:
          type: number
          description: Amount this user owes
        percentage:
          type: number
          nullable: true
      required: [id, expenseId, userId, user, amount]

    Expense:
      type: object
      properties:
        id:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
          nullable: true
          description: Null for non-group (friend-only) expenses.
        description:
          type: string
        category:
          type: string
          nullable: true
          description: Optional category label (e.g. "Food", "Transport").
        totalAmount:
          type: number
        currency:
          type: string
          default: USD
        splitType:
          $ref: "#/components/schemas/SplitType"
        paidByUserId:
          type: string
          format: uuid
        paidByUser:
          $ref: "#/components/schemas/User"
        date:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time
      required: [id, description, totalAmount, currency, splitType, paidByUserId, paidByUser, date, createdAt]

    ExpenseWithSplits:
      allOf:
        - $ref: "#/components/schemas/Expense"
        - type: object
          properties:
            splits:
              type: array
              items:
                $ref: "#/components/schemas/ExpenseSplit"
          required: [splits]

    ExpenseComment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        expenseId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        user:
          $ref: "#/components/schemas/User"
          nullable: true
        body:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, expenseId, userId, body, createdAt]

    CreateExpenseCommentBody:
      type: object
      properties:
        body:
          type: string
          minLength: 1
          maxLength: 2000
      required: [body]

    ExpenseSplitInput:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        amount:
          type: number
          nullable: true
        percentage:
          type: number
          nullable: true
      required: [userId]

    CreateExpenseBody:
      type: object
      properties:
        description:
          type: string
        category:
          type: string
          nullable: true
        totalAmount:
          type: number
        currency:
          type: string
          default: USD
        splitType:
          $ref: "#/components/schemas/SplitType"
        paidByUserId:
          type: string
          format: uuid
        date:
          type: string
          format: date
        splits:
          type: array
          items:
            $ref: "#/components/schemas/ExpenseSplitInput"
      required: [description, totalAmount, splitType, paidByUserId, date, splits]

    UpdateExpenseBody:
      type: object
      properties:
        description:
          type: string
        totalAmount:
          type: number
        currency:
          type: string
        splitType:
          $ref: "#/components/schemas/SplitType"
        paidByUserId:
          type: string
          format: uuid
        date:
          type: string
          format: date
        splits:
          type: array
          items:
            $ref: "#/components/schemas/ExpenseSplitInput"

    CreateFriendExpenseBody:
      type: object
      description: |
        Create a non-group expense between the current user and one or more friends.
        Splits must reference exactly the current user and the selected friends.
        Provide either `friendUserId` (single friend) or `friendUserIds` (one or more friends).
      properties:
        friendUserId:
          type: string
          format: uuid
          description: Single friend (legacy). Use `friendUserIds` for multi-friend expenses.
        friendUserIds:
          type: array
          description: One or more friend user IDs. Takes precedence over `friendUserId` when provided.
          items:
            type: string
            format: uuid
        description:
          type: string
        category:
          type: string
          nullable: true
        totalAmount:
          type: number
        currency:
          type: string
          default: USD
        splitType:
          $ref: "#/components/schemas/SplitType"
        paidByUserId:
          type: string
          format: uuid
        date:
          type: string
          format: date
        splits:
          type: array
          items:
            $ref: "#/components/schemas/ExpenseSplitInput"
      required: [description, totalAmount, splitType, paidByUserId, date, splits]

    # ─── Payment ──────────────────────────────────────────────────────────
    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
          nullable: true
        fromUserId:
          type: string
          format: uuid
        fromUser:
          $ref: "#/components/schemas/User"
        toUserId:
          type: string
          format: uuid
        toUser:
          $ref: "#/components/schemas/User"
        amount:
          type: number
        note:
          type: string
          nullable: true
        date:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time
      required: [id, fromUserId, fromUser, toUserId, toUser, amount, date, createdAt]

    CreateNonGroupPaymentBody:
      type: object
      properties:
        fromUserId:
          type: string
          format: uuid
        toUserId:
          type: string
          format: uuid
        amount:
          type: number
        note:
          type: string
          nullable: true
        date:
          type: string
          format: date
      required: [fromUserId, toUserId, amount, date]

    CreatePaymentBody:
      type: object
      properties:
        fromUserId:
          type: string
          format: uuid
        toUserId:
          type: string
          format: uuid
        amount:
          type: number
        note:
          type: string
          nullable: true
        date:
          type: string
          format: date
      required: [fromUserId, toUserId, amount, date]

    # ─── Dashboard ────────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      properties:
        totalOwed:
          type: number
          description: Total amount others owe me across all groups
        totalIOwe:
          type: number
          description: Total amount I owe others across all groups
        netBalance:
          type: number
          description: totalOwed - totalIOwe
        groupCount:
          type: integer
        groupSummaries:
          type: array
          items:
            $ref: "#/components/schemas/GroupBalanceSummary"
        nonGroupNetBalance:
          type: number
          description: Net balance from non-group (friend-only) expenses. Positive = you are owed.
        nonGroupExpenseCount:
          type: integer
          description: Number of non-group expenses involving the current user.
      required:
        [totalOwed, totalIOwe, netBalance, groupCount, groupSummaries, nonGroupNetBalance, nonGroupExpenseCount]

    GroupBalanceSummary:
      type: object
      properties:
        groupId:
          type: string
          format: uuid
        groupName:
          type: string
        avatarUrl:
          type: string
          nullable: true
        myNetBalance:
          type: number
      required: [groupId, groupName, myNetBalance]

    ActivityItem:
      type: object
      properties:
        id:
          type: string
          description: Unique ID like "expense-42" or "payment-12"
        type:
          type: string
          enum: [expense, payment]
        groupId:
          type: string
          format: uuid
        groupName:
          type: string
        description:
          type: string
        amount:
          type: number
        involvedUserId:
          type: string
          format: uuid
          description: The paidBy user (expense) or fromUser (payment)
        involvedUser:
          $ref: "#/components/schemas/User"
        date:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time
      required: [id, type, groupId, groupName, description, amount, involvedUserId, involvedUser, date, createdAt]
